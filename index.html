<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeno Knowledge Base</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif; background: #0d1117; color: #c9d1d9; padding: 16px; }
  h1 { color: #58a6ff; font-size: 1.4em; padding-bottom: 8px; border-bottom: 1px solid #30363d; margin-bottom: 12px; }
  .subtitle { color: #8b949e; font-size: 0.85em; margin-bottom: 16px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .card-name { color: #58a6ff; font-weight: 600; font-size: 1.05em; }
  .card-num { color: #484f58; font-size: 0.8em; }
  .card-desc { color: #c9d1d9; font-size: 0.9em; line-height: 1.5; margin-bottom: 8px; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; }
  .card-category { background: #1f2937; color: #7ee787; font-size: 0.75em; padding: 3px 8px; border-radius: 12px; }
  .card-link { color: #58a6ff; font-size: 0.85em; text-decoration: none; }
  .card-link:hover { text-decoration: underline; }
  .empty { color: #8b949e; text-align: center; padding: 60px 20px; font-size: 0.95em; }
  .count { color: #8b949e; font-size: 0.8em; margin-bottom: 12px; }
  .search { width: 100%; padding: 10px 12px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 0.95em; margin-bottom: 14px; outline: none; }
  .search:focus { border-color: #58a6ff; }
  .search::placeholder { color: #484f58; }
</style>
</head>
<body>
<h1>🐿️ Zeno Knowledge Base</h1>
<p class="subtitle">#ナレッジ チャンネルから随時更新</p>
<input type="text" class="search" id="search" placeholder="🔍 検索...">
<p class="count" id="count"></p>
<div id="content"><p class="empty">まだツールが登録されていません</p></div>
<script>
let allData=[];
fetch('tools.json').then(r=>r.json()).then(data=>{
  allData=data;
  render(data);
  document.getElementById('search').addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    render(q?data.filter(t=>t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||t.category.toLowerCase().includes(q)):data);
  });
});
function render(data){
  const c=document.getElementById('content');
  const ct=document.getElementById('count');
  if(!data.length){c.innerHTML='<p class="empty">該当なし</p>';ct.textContent='';return;}
  ct.textContent=data.length+'件';
  c.innerHTML=data.map((t,i)=>`<div class="card">
    <div class="card-header"><span class="card-name">${t.name}</span><span class="card-num">#${i+1}</span></div>
    <p class="card-desc">${t.desc}</p>
    <div class="card-footer"><span class="card-category">${t.category}</span><a class="card-link" href="${t.url}" target="_blank">詳細 →</a></div>
  </div>`).join('');
}
</script>
</body>
</html>
